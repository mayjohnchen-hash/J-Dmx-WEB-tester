<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J DMX Tester</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(reg => {
            console.log('ServiceWorker registered:', reg.scope);
          }).catch(err => {
            console.log('ServiceWorker registration failed:', err);
          });
        });
      }
    </script>
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1>DMX Controller</h1>
            <button id="connectBtn" class="btn btn-primary">Connect BLE</button>
        </div>
        <div class="status-bar">
            <span id="connectionStatus" class="status disconnected">Disconnected</span>
        </div>

        
        <!-- Top Navigation Tabs -->
        <nav class="top-tabs">
            <div class="nav-item active" data-target="page-general">
                <span class="nav-icon">⌨️</span>
                <span class="nav-label">傳統燈具 (General)</span>
            </div>
            <div class="nav-item" data-target="page-fixture">
                <span class="nav-icon">💡</span>
                <span class="nav-label">電腦燈具 (Fixtures)</span>
            </div>
            <div class="nav-item" data-target="page-remote">
                <span class="nav-icon">🎛️</span>
                <span class="nav-label">DMX Remote</span>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <!-- GENERAL PAGE -->
        <div id="page-general" class="page active">
            <div class="console-container">
                <div class="lcd-display">
                    <div id="lcdScreen" class="lcd-screen">_</div>
                    <div id="lcdHint" class="lcd-hint">e.g., 1 THRU 10 @ 255</div>
                </div>
                
                <div class="keypad">
                    <button class="key num-key" data-val="7">7</button>
                    <button class="key num-key" data-val="8">8</button>
                    <button class="key num-key" data-val="9">9</button>
                    <button class="key cmd-key cmd-clear" data-val="C">CLEAR</button>
                    
                    <button class="key num-key" data-val="4">4</button>
                    <button class="key num-key" data-val="5">5</button>
                    <button class="key num-key" data-val="6">6</button>
                    <button class="key cmd-key cmd-thru" data-val="THRU">THRU</button>

                    <button class="key num-key" data-val="1">1</button>
                    <button class="key num-key" data-val="2">2</button>
                    <button class="key num-key" data-val="3">3</button>
                    <button class="key cmd-key cmd-at" data-val="@">@</button>
                    
                    <button class="key cmd-key highlight" data-val="FULL">FULL</button>
                    <button class="key num-key" data-val="0">0</button>
                    <button class="key enter-key" data-val="ENTER">ENTER</button>
                </div>
                
                <div class="quick-tools">
                    <button id="btnPrevCh" class="tool-btn">⬅️ Prev CH</button>
                    <button id="btnNextCh" class="tool-btn">Next CH ➡️</button>
                    <button id="btnAllBlink" class="tool-btn effect-btn">Sweep 1-512</button>
                    <button id="btnChase" class="tool-btn effect-btn">Chase</button>
                </div>
            </div>

            <div class="active-section">
                <h2 class="section-title">Active Channels</h2>
                <div id="activeChannelsGrid" class="active-channels-grid">
                    <!-- Javascript will generate active channels here -->
                    <div class="empty-state">No Active Channels</div>
                </div>
            </div>
        </div>

        <!-- FIXTURE PAGE -->
        <div id="page-fixture" class="page">
            <div class="fixture-header">
                <div class="fixture-config-row">
                    <div class="fixture-selector-wrap">
                        <label>燈具型號 (Fixture):</label>
                        <select id="fixtureSelect" class="fixture-select">
                            <!-- Javascript will populate this from fixtures.js -->
                        </select>
                    </div>
                    <div class="addr-config">
                        <label>Start Addr (起始位址):</label>
                        <input type="number" id="fixtureStartAddr" min="1" max="490" value="1">
                    </div>
                </div>
                <div class="ma2-import-row">
                    <input type="file" id="ma2XmlInput" accept=".xml" style="display:none">
                    <button id="btnImportMa2" class="btn btn-secondary btn-sm">匯入 MA2 XML</button>
                    <label class="cache-label"><input type="checkbox" id="chkSaveMa2" checked> 儲存至快取</label>
                    <button id="btnClearMa2Cache" class="btn btn-outline-danger btn-sm" style="display: none;">清除快取</button>
                </div>
            </div>

            <div id="fixtureControlsGrid" class="fixture-controls-grid">
                <!-- Javascript will generate sliders and macro buttons here based on selected fixture -->
            </div>
        </div>

        <!-- REMOTE PAGE -->
        <div id="page-remote" class="page">
            <div class="remote-header">
                <div class="remote-pagination">
                    <button id="btnPrevRemotePage" class="btn btn-secondary">&lt;</button>
                    <div class="remote-page-selector">
                        <select id="remotePageSelect"></select>
                        <button id="btnEditRemotePage" class="btn btn-outline-secondary btn-sm" title="Edit Page Name">✏️</button>
                    </div>
                    <button id="btnNextRemotePage" class="btn btn-secondary">&gt;</button>
                </div>
                <div class="remote-edit-mode-toggle">
                    <label class="toggle-switch">
                        <input type="checkbox" id="remoteEditModeToggle">
                        <span class="slider round"></span>
                    </label>
                    <span class="edit-mode-label">編輯模式 (Edit Mode)</span>
                </div>
            </div>
            <div id="remoteButtonsGrid" class="remote-grid">
                <!-- Javascript will generate 16 buttons here -->
            </div>
        </div>

        <!-- REMOTE EDIT MODAL -->
        <div id="remoteEditModal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h3>編輯通道 <span id="editModalCh"></span></h3>
                <div class="modal-body">
                    <div class="modal-form-group">
                        <label>自訂名稱:</label>
                        <input type="text" id="editModalName" class="modal-input" placeholder="留空則顯示預設">
                    </div>
                    
                    <div class="modal-form-group">
                        <label>控制類型:</label>
                        <select id="editModalType" class="modal-input">
                            <option value="button">按鈕 (Button)</option>
                            <option value="fader">推桿 (Fader)</option>
                        </select>
                    </div>
                    
                    <div class="modal-form-group" id="editModalModeContainer">
                        <label>按鈕模式:</label>
                        <select id="editModalMode" class="modal-input">
                            <option value="toggle">切換 (Toggle) - 點擊開關</option>
                            <option value="flash">點亮 (Flash) - 按住開，放開關</option>
                        </select>
                    </div>
                </div>
                <div class="modal-actions">
                    <button id="btnEditModalCancel" class="btn btn-secondary">取消</button>
                    <button id="btnEditModalSave" class="btn btn-primary">儲存</button>
                </div>
            </div>
        </div>
    </main>


    <script src="fixtures.js"></script>

    <script src="app.js"></script>
</body>
</html>
